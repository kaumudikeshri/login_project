<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login project</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ecc3dc;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: #f6dde7;
            border-radius: 10px;
            padding: 30px;
            width: 400px;
        }
        h2 {
            color: palevioletred;
            text-align: center;
            margin-bottom: 20px;
        }
        form { 
            display: flex;
            flex-direction: column;
        }
        input {
            margin-bottom: 15px;
            padding: 6px;
            border-radius: 5px;
            background-color: #fbebf0;
            border: 1px solid black;
        }
        button { 
            background-color: #e95aad;
            color: #f8d8eb;
            padding: 5px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #73043c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="text" name="" id="" placeholder="email">
            <input type="password" name="" id="" placeholder="password">
            <button type="submit">login</button>
            </form>
    </div>
</body>
</html>
